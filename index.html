<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureGen - Password Generator</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #e4e4f1;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, #00d4ff, #0066ff);
            animation: float 6s ease-in-out infinite;
        }

        .bg-circle:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .bg-circle:nth-child(2) {
            width: 150px;
            height: 150px;
            top: 60%;
            right: 10%;
            animation-delay: 2s;
        }

        .bg-circle:nth-child(3) {
            width: 100px;
            height: 100px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .brand-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
        }

        .brand-icon i {
            color: white;
            font-size: 1.5rem;
        }

        .brand-text {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #a0a0b8;
            margin-bottom: 0.5rem;
        }

        .creator {
            font-size: 0.9rem;
            color: #6b7280;
            font-weight: 500;
        }

        .creator span {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #e4e4f1;
            font-size: 0.95rem;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 212, 255, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 8px rgba(0, 212, 255, 0.4);
        }

        .length-display {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-weight: 700;
            color: #00d4ff;
            text-align: center;
            min-width: 60px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00d4ff;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            flex: 1;
        }

        .generate-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 2rem 0;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .password-output {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .password-field {
            width: 100%;
            padding: 1rem 4rem 1rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #e4e4f1;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            resize: none;
            min-height: 60px;
            transition: all 0.2s ease;
        }

        .password-field:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .copy-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .copy-btn:hover {
            transform: translateY(-50%) scale(1.05);
        }

        .strength-meter {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .strength-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .strength-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0;
            transition: all 0.5s ease;
            border-radius: 3px;
        }

        .strength-weak { background: linear-gradient(90deg, #ff4757, #ff3742); }
        .strength-medium { background: linear-gradient(90deg, #ffa726, #ff9800); }
        .strength-strong { background: linear-gradient(90deg, #66bb6a, #4caf50); }
        .strength-very-strong { background: linear-gradient(90deg, #00d4ff, #0066ff); }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #6b7280;
            font-size: 0.9rem;
        }

        .footer a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .card {
                padding: 1.5rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .checkbox-group {
                grid-template-columns: 1fr;
            }
            
            .brand-text {
                font-size: 2rem;
            }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="brand">
                <div class="brand-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="brand-text">SecureGen</div>
            </div>
            <div class="subtitle">Advanced Password Generator</div>
            <div class="creator">Created by <span>Umar J</span></div>
        </div>

        <div class="card">
            <div class="form-group">
                <div class="form-row">
                    <div>
                        <label for="length">Password Length</label>
                        <input type="range" id="length" min="4" max="128" value="16">
                    </div>
                    <div>
                        <label>Length</label>
                        <div class="length-display" id="lengthDisplay">16</div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Character Options</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="uppercase" checked>
                        <label for="uppercase">Uppercase (A-Z)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="lowercase" checked>
                        <label for="lowercase">Lowercase (a-z)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="numbers" checked>
                        <label for="numbers">Numbers (0-9)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="symbols" checked>
                        <label for="symbols">Symbols (!@#$)</label>
                    </div>
                </div>
            </div>

            <button class="generate-btn" onclick="generatePassword()">
                <i class="fas fa-magic"></i> Generate Password
            </button>

            <div class="password-output">
                <textarea class="password-field" id="passwordField" readonly placeholder="Your secure password will appear here..."></textarea>
                <button class="copy-btn" onclick="copyPassword()">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>

            <div class="strength-meter" id="strengthMeter" style="display: none;">
                <div class="strength-label">
                    <span>Password Strength</span>
                    <span id="strengthText">-</span>
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Built with ❤️ by <a href="#">Umar J</a> | Secure Password Generation</p>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check"></i> Password copied to clipboard!
    </div>

    <script>
        const lengthSlider = document.getElementById('length');
        const lengthDisplay = document.getElementById('lengthDisplay');
        const passwordField = document.getElementById('passwordField');
        const strengthMeter = document.getElementById('strengthMeter');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const toast = document.getElementById('toast');

        // Update length display
        lengthSlider.addEventListener('input', function() {
            lengthDisplay.textContent = this.value;
        });

        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            const uppercase = document.getElementById('uppercase').checked;
            const lowercase = document.getElementById('lowercase').checked;
            const numbers = document.getElementById('numbers').checked;
            const symbols = document.getElementById('symbols').checked;

            let charset = '';
            if (uppercase) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (lowercase) charset += 'abcdefghijklmnopqrstuvwxyz';
            if (numbers) charset += '0123456789';
            if (symbols) charset += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (!charset) {
                alert('Please select at least one character option!');
                return;
            }

            let password = '';
            
            // Ensure at least one character from each selected type
            if (uppercase) password += charset.charAt(Math.floor(Math.random() * 26));
            if (lowercase) password += charset.charAt(Math.floor(Math.random() * 26) + (uppercase ? 26 : 0));
            if (numbers) password += '0123456789'.charAt(Math.floor(Math.random() * 10));
            if (symbols) password += '!@#$%^&*()_+-=[]{}|;:,.<>?'.charAt(Math.floor(Math.random() * 32));

            // Fill remaining length
            for (let i = password.length; i < length; i++) {
                password += charset.charAt(Math.floor(Math.random() * charset.length));
            }

            // Shuffle the password
            password = password.split('').sort(() => Math.random() - 0.5).join('');

            passwordField.value = password;
            calculateStrength(password);
            strengthMeter.style.display = 'block';
        }

        function calculateStrength(password) {
            let score = 0;
            let strength = 'Very Weak';
            let color = 'strength-weak';
            let width = '20%';

            // Length bonus
            if (password.length >= 8) score += 1;
            if (password.length >= 12) score += 1;
            if (password.length >= 16) score += 1;

            // Character variety bonus
            if (/[a-z]/.test(password)) score += 1;
            if (/[A-Z]/.test(password)) score += 1;
            if (/\d/.test(password)) score += 1;
            if (/[^a-zA-Z\d]/.test(password)) score += 1;

            // Determine strength
            if (score >= 7) {
                strength = 'Very Strong';
                color = 'strength-very-strong';
                width = '100%';
            } else if (score >= 5) {
                strength = 'Strong';
                color = 'strength-strong';
                width = '75%';
            } else if (score >= 3) {
                strength = 'Medium';
                color = 'strength-medium';
                width = '50%';
            } else {
                strength = 'Weak';
                color = 'strength-weak';
                width = '25%';
            }

            strengthText.textContent = strength;
            strengthFill.className = `strength-fill ${color}`;
            strengthFill.style.width = width;
        }

        function copyPassword() {
            if (!passwordField.value) {
                alert('Generate a password first!');
                return;
            }

            passwordField.select();
            document.execCommand('copy');
            showToast();
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Generate initial password
        generatePassword();
    </script>
</body>
</html>
