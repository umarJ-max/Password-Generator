<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureGen — Password Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f1a;
      --surface:  #141622;
      --card:     #1b1e2e;
      --border:   rgba(255,255,255,0.08);
      --border-hi:rgba(255,255,255,0.14);
      --ink:      #eef0ff;
      --ink2:     #9496b0;
      --muted:    #5c5f7a;
      --cyan:     #00d4ff;
      --blue:     #4d7cff;
      --grad:     linear-gradient(135deg, #00d4ff, #4d7cff);
      --red:      #ff5252;
      --orange:   #ff9800;
      --green:    #66bb6a;
      --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono:     'Courier New', 'Fira Mono', monospace;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 56px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Ambient orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
    }
    body::before {
      width: 400px; height: 400px;
      background: rgba(0,212,255,0.07);
      top: -120px; left: 50%;
      transform: translateX(-60%);
    }
    body::after {
      width: 320px; height: 320px;
      background: rgba(77,124,255,0.07);
      bottom: -80px; right: 10%;
    }

    .page {
      position: relative; z-index: 1;
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Header ── */
    .hdr {
      text-align: center;
      padding: 12px 0 8px;
    }
    .hdr-brand {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 6px;
    }
    .hdr-icon {
      width: 40px; height: 40px;
      background: var(--grad);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 6px 20px rgba(0,212,255,0.25);
    }
    .hdr-title {
      font-size: 1.8rem; font-weight: 800;
      letter-spacing: -0.5px;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hdr-sub { font-size: 0.82rem; color: var(--muted); }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
    }

    /* ── Password output ── */
    .pwd-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    .pwd-field {
      width: 100%;
      padding: 15px 80px 15px 16px;
      background: rgba(0,0,0,0.35);
      border: 1.5px solid var(--border-hi);
      border-radius: 12px;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 0.97rem;
      letter-spacing: 0.5px;
      outline: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: text;
      transition: border-color 0.2s;
    }
    .pwd-field:focus { border-color: var(--cyan); }

    .btn-copy {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      padding: 7px 14px;
      background: var(--grad);
      border: none; border-radius: 8px;
      color: #fff; font-size: 0.78rem; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-copy:hover { opacity: 0.85; transform: translateY(-50%) scale(1.04); }
    .btn-copy.copied { background: linear-gradient(135deg, #66bb6a, #43a047); }

    /* ── Strength bar ── */
    .strength-wrap { margin-bottom: 20px; }
    .strength-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 7px;
    }
    .strength-lbl {
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted);
    }
    .strength-txt {
      font-size: 0.78rem; font-weight: 700;
    }
    .strength-track {
      width: 100%; height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px; overflow: hidden;
    }
    .strength-fill {
      height: 100%; width: 0;
      border-radius: 3px;
      transition: width 0.5s ease, background 0.5s ease;
    }

    /* ── Divider ── */
    .divider {
      height: 1px; background: var(--border); margin: 4px 0 18px;
    }

    /* ── Slider row ── */
    .slider-row {
      margin-bottom: 18px;
    }
    .slider-label-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .field-lbl {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted);
    }
    .length-badge {
      font-size: 0.85rem; font-weight: 800;
      color: var(--cyan);
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.2);
      padding: 2px 12px; border-radius: 50px;
      min-width: 44px; text-align: center;
    }

    /* Slider with live fill */
    .slider-track-wrap { position: relative; height: 8px; }
    .slider-bg {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      pointer-events: none;
    }
    .slider-fill-bar {
      position: absolute; top: 0; left: 0; height: 100%;
      background: var(--grad);
      border-radius: 4px;
      pointer-events: none;
      transition: width 0.05s;
    }
    input[type="range"] {
      position: absolute; inset: -6px 0;
      width: 100%; height: 20px;
      -webkit-appearance: none; appearance: none;
      background: transparent;
      outline: none; cursor: pointer; margin: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #4d7cff);
      box-shadow: 0 2px 8px rgba(0,212,255,0.5);
      border: 2px solid #fff;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px; height: 20px; border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #4d7cff);
      box-shadow: 0 2px 8px rgba(0,212,255,0.5);
      border: 2px solid #fff;
      cursor: pointer;
    }
    .slider-hints {
      display: flex; justify-content: space-between;
      margin-top: 8px;
      font-size: 0.65rem; color: var(--muted);
    }

    /* ── Checkboxes ── */
    .checks-lbl {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 1.4px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px; display: block;
    }
    .checks-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 20px;
    }
    .check-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: 11px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .check-item:hover { border-color: var(--border-hi); background: rgba(255,255,255,0.06); }
    .check-item.active {
      border-color: rgba(0,212,255,0.4);
      background: rgba(0,212,255,0.07);
    }
    .check-item input { display: none; }

    .check-box {
      width: 18px; height: 18px; flex-shrink: 0;
      border: 2px solid var(--border-hi);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-size: 11px;
    }
    .check-item.active .check-box {
      background: var(--grad);
      border-color: transparent;
    }
    .check-item.active .check-box::after { content: '✓'; color: #fff; font-weight: 900; }

    .check-info { flex: 1; min-width: 0; }
    .check-name { font-size: 0.84rem; font-weight: 600; color: var(--ink); }
    .check-ex   { font-size: 0.67rem; color: var(--muted); font-family: var(--mono); margin-top: 1px; }

    /* ── Generate button ── */
    .btn-gen {
      width: 100%;
      padding: 15px;
      background: var(--grad);
      border: none; border-radius: 12px;
      color: #fff; font-size: 1rem; font-weight: 800;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,212,255,0.3);
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
      position: relative; overflow: hidden;
    }
    .btn-gen::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-gen:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(0,212,255,0.4); }
    .btn-gen:active { transform: translateY(0); }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: linear-gradient(135deg, #66bb6a, #43a047);
      color: #fff; padding: 11px 22px;
      border-radius: 50px;
      font-size: 0.85rem; font-weight: 700;
      box-shadow: 0 6px 24px rgba(102,187,106,0.4);
      z-index: 1000;
      transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Footer ── */
    .footer {
      text-align: center; font-size: 0.72rem; color: var(--muted);
      padding-top: 4px;
    }
    .footer a { color: var(--ink2); font-weight: 700; text-decoration: none; }
    .footer a:hover { color: var(--cyan); }

    @media (max-width: 480px) {
      body { padding: 24px 12px 48px; }
      .card { padding: 18px; }
      .checks-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-icon">🔐</div>
      <span class="hdr-title">SecureGen</span>
    </div>
    <p class="hdr-sub">Generate strong, random passwords instantly</p>
  </header>

  <!-- Main card -->
  <div class="card">

    <!-- Password output -->
    <div class="pwd-wrap">
      <input type="text" class="pwd-field" id="pwdField" readonly placeholder="Click Generate…" />
      <button class="btn-copy" id="copyBtn" onclick="copyPwd()">Copy</button>
    </div>

    <!-- Strength -->
    <div class="strength-wrap">
      <div class="strength-top">
        <span class="strength-lbl">Strength</span>
        <span class="strength-txt" id="strengthTxt" style="color:var(--muted)">—</span>
      </div>
      <div class="strength-track">
        <div class="strength-fill" id="strengthFill"></div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Length slider -->
    <div class="slider-row">
      <div class="slider-label-row">
        <span class="field-lbl">Password length</span>
        <span class="length-badge" id="lengthBadge">16</span>
      </div>
      <div class="slider-track-wrap">
        <div class="slider-bg"></div>
        <div class="slider-fill-bar" id="sliderFill"></div>
        <input type="range" id="lengthSlider" min="4" max="64" value="16" oninput="onSlider()" />
      </div>
      <div class="slider-hints"><span>4</span><span>64</span></div>
    </div>

    <!-- Character options -->
    <span class="checks-lbl">Include characters</span>
    <div class="checks-grid">
      <div class="check-item active" id="ci-upper" onclick="toggleCheck('upper')">
        <input type="checkbox" id="upper" checked />
        <div class="check-box"></div>
        <div class="check-info">
          <div class="check-name">Uppercase</div>
          <div class="check-ex">A B C … Z</div>
        </div>
      </div>
      <div class="check-item active" id="ci-lower" onclick="toggleCheck('lower')">
        <input type="checkbox" id="lower" checked />
        <div class="check-box"></div>
        <div class="check-info">
          <div class="check-name">Lowercase</div>
          <div class="check-ex">a b c … z</div>
        </div>
      </div>
      <div class="check-item active" id="ci-nums" onclick="toggleCheck('nums')">
        <input type="checkbox" id="nums" checked />
        <div class="check-box"></div>
        <div class="check-info">
          <div class="check-name">Numbers</div>
          <div class="check-ex">0 1 2 … 9</div>
        </div>
      </div>
      <div class="check-item active" id="ci-syms" onclick="toggleCheck('syms')">
        <input type="checkbox" id="syms" checked />
        <div class="check-box"></div>
        <div class="check-info">
          <div class="check-name">Symbols</div>
          <div class="check-ex">! @ # $ % &</div>
        </div>
      </div>
    </div>

    <!-- Generate button -->
    <button class="btn-gen" onclick="generate()">⚡ Generate Password</button>

  </div>

  <footer class="footer">
    Made with ♥ by <a href="https://github.com/umarJ-max" target="_blank">Umar J</a>
  </footer>

</div>

<div class="toast" id="toast">✓ Copied to clipboard!</div>

<script>
  const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const LOWER = 'abcdefghijklmnopqrstuvwxyz';
  const NUMS  = '0123456789';
  const SYMS  = '!@#$%^&*()_+-=[]{}|;:,.<>?';

  const slider      = document.getElementById('lengthSlider');
  const badge       = document.getElementById('lengthBadge');
  const sliderFill  = document.getElementById('sliderFill');
  const pwdField    = document.getElementById('pwdField');
  const strengthFill= document.getElementById('strengthFill');
  const strengthTxt = document.getElementById('strengthTxt');
  const copyBtn     = document.getElementById('copyBtn');
  const toast       = document.getElementById('toast');

  // ── Slider ──────────────────────────────────────────────────────────────
  function onSlider() {
    const val = slider.value;
    const pct = ((val - slider.min) / (slider.max - slider.min)) * 100;
    badge.textContent = val;
    sliderFill.style.width = pct + '%';
    generate();
  }

  // ── Toggle checkbox ──────────────────────────────────────────────────────
  function toggleCheck(id) {
    const cb   = document.getElementById(id);
    const item = document.getElementById('ci-' + id);
    // Prevent unchecking the last active one
    const activeCount = ['upper','lower','nums','syms'].filter(i => document.getElementById(i).checked).length;
    if (cb.checked && activeCount === 1) return; // must keep at least one
    cb.checked = !cb.checked;
    item.classList.toggle('active', cb.checked);
    generate();
  }

  // ── Generate ─────────────────────────────────────────────────────────────
  function generate() {
    const len   = parseInt(slider.value);
    const upper = document.getElementById('upper').checked;
    const lower = document.getElementById('lower').checked;
    const nums  = document.getElementById('nums').checked;
    const syms  = document.getElementById('syms').checked;

    let charset = '';
    const pools = [];
    if (upper) { charset += UPPER; pools.push(UPPER); }
    if (lower) { charset += LOWER; pools.push(LOWER); }
    if (nums)  { charset += NUMS;  pools.push(NUMS);  }
    if (syms)  { charset += SYMS;  pools.push(SYMS);  }

    if (!charset) return;

    // Guarantee at least one char from each selected pool
    let pwd = pools.map(p => p[Math.floor(Math.random() * p.length)]);

    // Fill the rest
    for (let i = pwd.length; i < len; i++) {
      pwd.push(charset[Math.floor(Math.random() * charset.length)]);
    }

    // Shuffle using crypto random for better randomness
    for (let i = pwd.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pwd[i], pwd[j]] = [pwd[j], pwd[i]];
    }

    pwdField.value = pwd.join('');
    updateStrength(pwdField.value);
    // Reset copy button if user regenerates
    copyBtn.textContent = 'Copy';
    copyBtn.classList.remove('copied');
  }

  // ── Strength ──────────────────────────────────────────────────────────────
  function updateStrength(pwd) {
    let score = 0;
    if (pwd.length >= 8)  score++;
    if (pwd.length >= 12) score++;
    if (pwd.length >= 20) score++;
    if (/[a-z]/.test(pwd)) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/\d/.test(pwd))   score++;
    if (/[^a-zA-Z\d]/.test(pwd)) score++;

    let label, color, width;
    if (score >= 6)      { label = 'Very Strong'; color = '#4d7cff'; width = '100%'; }
    else if (score >= 5) { label = 'Strong';      color = '#66bb6a'; width = '75%';  }
    else if (score >= 3) { label = 'Medium';      color = '#ff9800'; width = '50%';  }
    else                 { label = 'Weak';         color = '#ff5252'; width = '25%';  }

    strengthTxt.textContent = label;
    strengthTxt.style.color = color;
    strengthFill.style.width = width;
    strengthFill.style.background = color;
  }

  // ── Copy ──────────────────────────────────────────────────────────────────
  async function copyPwd() {
    const pwd = pwdField.value;
    if (!pwd) return;
    try {
      await navigator.clipboard.writeText(pwd);
    } catch {
      // fallback
      pwdField.select();
      document.execCommand('copy');
    }
    copyBtn.textContent = '✓ Copied';
    copyBtn.classList.add('copied');
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
      copyBtn.textContent = 'Copy';
      copyBtn.classList.remove('copied');
    }, 2500);
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  onSlider(); // sets fill + badge + generates first password
</script>
</body>
</html>
